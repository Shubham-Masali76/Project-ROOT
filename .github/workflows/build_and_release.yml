name: Build and Release ROOT

on:
  push:
    tags:
      - 'v*' # Triggers workflow only when you push a tag starting with 'v', like v3.0.0

permissions:
  contents: write # REQUIRED to allow the cloud server to upload the .exe to the Release page

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Use a stable Python version

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build the EXE
        run: pyinstaller --onefile --noconsole --icon=icon.ico --name ROOT_Setup bootstrapper.py

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ROOT_Setup.exe
          token: ${{ secrets.GITHUB_TOKEN }}
